name: Weekly content generation

# Replaces the Mac crontab job. Generates 1 health + 1 recipe draft, commits
# their images to GitHub, saves drafts to Cloudflare KV, and emails them for
# review. Approval/publish still happens via the shl-approval Worker.

on:
  schedule:
    # ~09:00 America/New_York. GitHub cron is UTC and has no TZ, so this is
    # 13:00 UTC (9am EDT); it drifts to 8am during EST. Fine for a weekly email.
    - cron: '0 13 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write # the generate script commits Pexels images into this repo

concurrency:
  group: weekly-content
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # draft-store.js calls the bare `wrangler` binary via execFileSync
      - name: Put wrangler on PATH
        run: echo "${{ github.workspace }}/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Generate drafts and email for review
        run: node scripts/generate-weekly.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REVIEW_EMAIL: ${{ secrets.REVIEW_EMAIL }}
          # Built-in token (contents:write) — used to commit images to this repo
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: sawhney9
          GITHUB_REPO: selfhealthliving-static
          # Needs Workers KV Storage:Edit (NOT just Pages:Edit) for the KV write
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: c1b834d2ae6b8b994809e0ef148619b1
