name: Deploy to Cloudflare Pages

# Builds the Astro site and deploys to the existing (Direct Upload) Pages
# project on every push to main — including the approval Worker's
# "Approve & Publish" commits. Replaces the manual `wrangler pages deploy`.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: c1b834d2ae6b8b994809e0ef148619b1
          command: pages deploy ./dist --project-name=selfhealthliving-static --branch=main
